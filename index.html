<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DYP</title>
<style>
  :root{ --paper:#FAFAF7; --ink:#1A1A1A; --ink2:#8A8A85; --grid:#E7E7E0; --accent:#ECFEAA; }
  *{box-sizing:border-box}
  body{ margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:"Pretendard",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; -webkit-font-smoothing:antialiased; }
  .card{ width:100%; max-width:460px; padding:40px 24px; text-align:center; }
  .mark{ font-size:34px; font-weight:700; letter-spacing:.02em; }
  .mark .hl{ background:var(--accent); padding:2px 6px; }
  .tag{ color:var(--ink2); font-size:13px; letter-spacing:.02em; margin:10px 0 40px; }
  .label{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink2);
    border-top:1px solid var(--grid); padding-top:22px; margin-bottom:14px; }
  .links a{ display:inline-block; margin:0 8px; padding:9px 18px; border:1px solid var(--ink);
    border-radius:2px; color:var(--ink); text-decoration:none; font-size:14px; }
  .links a:hover{ background:var(--ink); color:var(--paper); }
</style>
</head>
<body>
  <div class="card">
    <div class="mark"><span class="hl">DYP</span></div>
    <div class="tag">drag your plan and actualize it</div>
    <div class="label">Privacy Policy · 개인정보처리방침</div>
    <div class="links">
      <a href="privacy-ko.html">한국어</a>
      <a href="privacy-en.html">English</a>
    </div>
  </div>
</body>
</html>
